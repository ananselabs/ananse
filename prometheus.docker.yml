global:
  scrape_interval: 5s # Faster scrape for "playing"
  evaluation_interval: 5s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: 'ananse_service_mesh'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8089']
        labels:
          service: 'ananse'
          environment: 'dev'
