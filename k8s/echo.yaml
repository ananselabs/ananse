apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: ananse
  labels:
    app: echo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
      - name: echo
        image: echo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4199
        env:
        - name: PORT
          value: "4199"
        livenessProbe:
          httpGet:
            path: /health
            port: 4199
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4199
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: ananse
spec:
  selector:
    app: echo
  ports:
    - protocol: TCP
      port: 4199
      targetPort: 4199
  type: ClusterIP
