apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: ananse
  labels:
    app: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
      - name: payments
        image: payments:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5003
        env:
        - name: PORT
          value: "5003"
        livenessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5003
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: ananse
  labels:
    ananse.io/mesh: "enabled"
spec:
  selector:
    app: payments
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: ClusterIP
