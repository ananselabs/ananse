#serviceAccount for controlplane
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ananse-controlplane
  namespace: ananse
---
#Clusterrole with read permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ananse-controlplane
rules:
  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # EndpointSlices (discovery API)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get","list","watch"]
  # Pods (for identity/mtls)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get","list","watch"]
  #Namespaces(for config)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ananse-controlplane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ananse-controlplane
subjects:
  - kind: ServiceAccount
    name: ananse-controlplane
    namespace: ananse
---

