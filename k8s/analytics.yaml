apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: ananse
  labels:
    app: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
        app.kubernetes.io/part-of: ananse-mesh
    spec:
      containers:
      - name: analytics
        image: analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5004
        env:
        - name: PORT
          value: "5004"
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: ananse
  labels:
    ananse.io/mesh: "enabled"
spec:
  selector:
    app: analytics
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
  type: ClusterIP
