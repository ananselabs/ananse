# prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules
rule_files:
  - "alert_rules.yml"

# Scrape your service mesh
scrape_configs:
  - job_name: 'ananse_service_mesh'
    static_configs:
      - targets: ['localhost:8089']
        labels:
          service: 'ananse'
          environment: 'dev'