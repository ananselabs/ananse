name: "ananse"
namespace: "ananse-system"

# TLS certs for webhook (create secret manually if not provided)
tls:
  crtBase64: ""  # Pass pre-encoded: cat server.crt | base64 | tr -d '\n'
  keyBase64: ""  # Pass pre-encoded: cat server.key | base64 | tr -d '\n'
debug_mode: "false"
failurePolicy: "Fail"

controlplane:
  image: "ghcr.io/ananselabs/ananse-controlplane:latest"

sidecar:
  image: "ghcr.io/ananselabs/ananse-proxy:latest"

init:
  image: "ghcr.io/ananselabs/ananse-init:latest"

discovery:
  mode: "k8s"  # k8s | consul | file
  consul:
    address: "localhost:8500"
    tag: ""

metrics:
  enabled: true
  port: 9090

proxy:
  mode: "sidecar"  # sidecar | gateway

# Observability stack - disabled by default
# Enable to pull in as dependencies
observability:
  prometheus:
    enabled: false
  loki:
    enabled: false
  promtail:
    enabled: false
  tempo:
    enabled: false
  dashboard:
    enabled: true  # Auto-load Grafana dashboard (requires prometheus.enabled)
  serviceMonitor:
    enabled: true   # Deploy ServiceMonitor (works with any existing Prometheus)
    labels: {}      # Extra labels, e.g. team: default

# Override sub-chart values when enabled
# Example: kube-prometheus-stack config
kube-prometheus-stack:
  grafana:
    enabled: true
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false

# Example: tempo config
tempo:
  tempo:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
