apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  namespace: ananse-system
  labels:
    app: webhook-ananse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-ananse
  template:
    metadata:
      labels:
        app: webhook-ananse
    spec:
      serviceAccountName: ananse-injector
      containers:
        - name: controlplane
          image: anthony4m/ananse-controlplane:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
              name: webhook-ananse
          args: ["-k8s"]
          envFrom:
            - configMapRef:
                name: ananse-injector-config
          volumeMounts:
            - mountPath: "/etc/webhook/certs"
              name: certs
              readOnly: true

      volumes:
        - name: certs
          secret:
            secretName: ananse-webhook-certs

